# Kite Connect credentials — TEMPLATE.
#
# Copy this file to `kite.yaml` in the same folder and paste your credentials
# into the `api_key` and `api_secret` fields. The `access_token` and
# `access_token_expires` fields are filled in automatically by
# `python scripts/kite.py auth` after you complete the daily browser login.
#
# This entire `secrets/` folder is gitignored (see .gitignore). The only file
# tracked in git is this template (`kite.example.yaml`).
#
# NEVER paste these values into chat, email, or any other persistent channel.
# If a credential leaks, regenerate the secret at developers.kite.trade
# immediately (My apps > Veda-Test > Regenerate Secret).

api_key:       # paste your Kite API key here (from developers.kite.trade > My apps)
api_secret:   # paste your Kite API secret here

# Filled by `python scripts/kite.py auth` — do not edit by hand.
access_token:
access_token_expires:   # ISO-8601 with timezone, e.g. 2026-04-22T06:00:00+05:30
